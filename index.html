<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Trabalhista</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0a1628; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Importamos as ferramentas do Recharts de forma que o navegador entenda
        const { useState } = React;
        const { 
            BarChart, Bar, LineChart, Line, XAxis, YAxis, 
            CartesianGrid, Tooltip, ResponsiveContainer, Legend 
        } = Recharts;

        // --- SEU CÓDIGO COMEÇA AQUI ---
        const evolucao = [
          { ano: "2016", processos: 2.76 }, { ano: "2017", processos: 2.65 }, { ano: "2018", processos: 1.75 },
          { ano: "2019", processos: 1.60 }, { ano: "2020", processos: 1.40 }, { ano: "2021", processos: 1.78 },
          { ano: "2022", processos: 1.89 }, { ano: "2023", processos: 2.10 }, { ano: "2024", processos: 2.40 },
          { ano: "2025", processos: 2.47 },
        ];

        const pedidos = [
          { tema: "Verbas rescisórias", pct: 30, cor: "#e63946" },
          { tema: "Dano moral", pct: 25.8, cor: "#f4a261" },
          { tema: "Horas extras", pct: 22.8, cor: "#2a9d8f" },
          { tema: "Insalubridade", pct: 20, cor: "#457b9d" },
          { tema: "FGTS", pct: 9.5, cor: "#6a4c93" },
        ];

        const regioes = [
          { trt: "TRT-15 (SP interior)", processos: 300642, valor: 6.5, estado: "São Paulo" },
          { trt: "TRT-5 (BA)", processos: 213832, valor: 3.1, estado: "Bahia" },
          { trt: "TRT-4 (RS)", processos: 153544, valor: 5.55, estado: "Rio Grande do Sul" },
          { trt: "TRT-2 (SP capital)", processos: 290000, valor: 5.2, estado: "São Paulo" },
          { trt: "TRT-1 (RJ)", processos: 185000, valor: 4.1, estado: "Rio de Janeiro" },
          { trt: "TRT-12 (SC)", processos: 86300, valor: 2.1, estado: "Santa Catarina" },
        ];

        const empresas = [
          { nome: "Correios (ECT)", setor: "Estatal", processos: 9660, tipo: "Estatal" },
          { nome: "Caixa Econômica Federal", setor: "Banco público", processos: 8900, tipo: "Banco Público" },
          { nome: "Bradesco", setor: "Banco privado", processos: 7200, tipo: "Banco Privado" },
          { nome: "Banco do Brasil", setor: "Banco público", processos: 6800, tipo: "Banco Público" },
          { nome: "Petrobras", setor: "Estatal", processos: 5900, tipo: "Estatal" },
          { nome: "Itaú Unibanco", setor: "Banco privado", processos: 5400, tipo: "Banco Privado" },
          { nome: "BRF/Sadia/Perdigão", setor: "Alimentos", processos: 4100, tipo: "Indústria" },
          { nome: "Seara / JBS", setor: "Alimentos", processos: 3800, tipo: "Indústria" },
        ];

        const TABS = ["Evolução Histórica", "Pedidos Mais Frequentes", "Por Região", "Empresas Mais Acionadas"];

        const corTipo = {
          "Estatal": "#e63946",
          "Banco Público": "#2a9d8f",
          "Banco Privado": "#457b9d",
          "Indústria": "#f4a261",
        };

        const CustomTooltipLine = ({ active, payload, label }) => {
          if (active && payload && payload.length) {
            const isReforma = label === "2017" || label === "2018";
            return (
              <div style={{ background: "#0d1b2a", border: "1px solid #2a9d8f", borderRadius: 8, padding: "10px 16px" }}>
                <p style={{ color: "#8ecae6", margin: 0, fontSize: 13 }}>{label}</p>
                <p style={{ color: "#fff", margin: 0, fontSize: 16, fontWeight: 700 }}>{payload[0].value}M processos</p>
                {isReforma && <p style={{ color: "#f4a261", margin: 0, fontSize: 11 }}>⚑ Reforma Trabalhista</p>}
              </div>
            );
          }
          return null;
        };

        const ReformaDot = (props) => {
          const { cx, cy, payload } = props;
          if (payload.ano === "2017" || payload.ano === "2018") {
            return <circle cx={cx} cy={cy} r={7} fill="#f4a261" stroke="#fff" strokeWidth={2} />;
          }
          return <circle cx={cx} cy={cy} r={4} fill="#2a9d8f" stroke="#0d1b2a" strokeWidth={2} />;
        };

        function Dashboard() {
          const [tab, setTab] = useState(0);

          return (
            <div style={{
              background: "#0a1628",
              minHeight: "100vh",
              fontFamily: "'Georgia', serif",
              color: "#e8e8e8",
              padding: "0 0 40px 0",
            }}>
              {/* Header */}
              <div style={{
                background: "linear-gradient(135deg, #0d1b2a 0%, #1a2f4a 100%)",
                borderBottom: "2px solid #2a9d8f",
                padding: "32px 40px 24px",
              }}>
                <div style={{ maxWidth: 960, margin: "0 auto" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
                    <div style={{ width: 4, height: 32, background: "#e63946", borderRadius: 2 }} />
                    <p style={{ color: "#8ecae6", margin: 0, fontSize: 12, letterSpacing: 3, textTransform: "uppercase" }}>
                      Mapeamento · Justiça do Trabalho · Brasil
                    </p>
                  </div>
                  <h1 style={{ margin: 0, fontSize: 28, fontWeight: 700, color: "#fff", lineHeight: 1.2 }}>
                    Processos Trabalhistas Pós-Reforma
                  </h1>
                  <p style={{ margin: "8px 0 0", color: "#8ecae6", fontSize: 14 }}>
                    Lei 13.467/2017 → 2025 · Dados: TST, CNJ, TRTs
                  </p>
                </div>
              </div>

              {/* KPIs */}
              <div style={{ maxWidth: 960, margin: "24px auto 0", padding: "0 40px" }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 16, marginBottom: 28 }}>
                  {[
                    { label: "Processos em 2025", valor: "2,47M", delta: "+8,5% vs 2024", cor: "#e63946" },
                    { label: "Queda pós-reforma", valor: "−31,2%", delta: "maior queda histórica", cor: "#2a9d8f" },
                    { label: "Pago às partes 2025", valor: "R$ 50,7bi", delta: "recorde histórico", cor: "#f4a261" },
                    { label: "Tempo médio", valor: "197 dias", delta: "−8,4% desde 2020", cor: "#8ecae6" },
                  ].map((k, i) => (
                    <div key={i} style={{
                      background: "#0d1b2a",
                      border: `1px solid ${k.cor}33`,
                      borderTop: `3px solid ${k.cor}`,
                      borderRadius: 10,
                      padding: "16px 18px",
                    }}>
                      <p style={{ margin: 0, fontSize: 11, color: "#8ecae6", letterSpacing: 1, textTransform: "uppercase" }}>{k.label}</p>
                      <p style={{ margin: "6px 0 4px", fontSize: 22, fontWeight: 700, color: "#fff" }}>{k.valor}</p>
                      <p style={{ margin: 0, fontSize: 11, color: k.cor }}>{k.delta}</p>
                    </div>
                  ))}
                </div>

                {/* Tabs */}
                <div style={{ display: "flex", gap: 4, marginBottom: 24, borderBottom: "1px solid #1e3a5f", overflowX: "auto" }}>
                  {TABS.map((t, i) => (
                    <button key={i} onClick={() => setTab(i)} style={{
                      background: tab === i ? "#2a9d8f" : "transparent",
                      color: tab === i ? "#fff" : "#8ecae6",
                      border: "none",
                      borderRadius: "8px 8px 0 0",
                      padding: "10px 18px",
                      fontSize: 13,
                      cursor: "pointer",
                      fontFamily: "Georgia, serif",
                      whiteSpace: "nowrap",
                      fontWeight: tab === i ? 700 : 400,
                    }}>{t}</button>
                  ))}
                </div>

                {/* Conteúdo das Tabs seguindo sua lógica */}
                {tab === 0 && (
                  <div style={{ background: "#0d1b2a", borderRadius: 12, padding: "28px 24px", border: "1px solid #1e3a5f" }}>
                    <h2 style={{ margin: "0 0 6px", fontSize: 18, color: "#fff" }}>Novos Processos por Ano (em milhões)</h2>
                    <ResponsiveContainer width="100%" height={320}>
                      <LineChart data={evolucao}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#1e3a5f" />
                        <XAxis dataKey="ano" stroke="#8ecae6" />
                        <YAxis stroke="#8ecae6" domain={[1.2, 3.0]} tickFormatter={v => `${v}M`} />
                        <Tooltip content={<CustomTooltipLine />} />
                        <Line type="monotone" dataKey="processos" stroke="#2a9d8f" strokeWidth={2.5} dot={<ReformaDot />} />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                )}

                {tab === 1 && (
                  <div style={{ background: "#0d1b2a", borderRadius: 12, padding: "28px 24px", border: "1px solid #1e3a5f" }}>
                    <h2 style={{ margin: "0 0 6px", fontSize: 18, color: "#fff" }}>Pedidos Mais Frequentes</h2>
                    {pedidos.map((p, i) => (
                      <div key={i} style={{ marginBottom: 18 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                          <span style={{ fontSize: 14 }}>{p.tema}</span>
                          <span style={{ fontWeight: 700, color: p.cor }}>{p.pct}%</span>
                        </div>
                        <div style={{ background: "#1e3a5f", borderRadius: 4, height: 8 }}>
                          <div style={{ width: `${(p.pct / 35) * 100}%`, height: "100%", background: p.cor, borderRadius: 4 }} />
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {tab === 2 && (
                  <div style={{ background: "#0d1b2a", borderRadius: 12, padding: "28px 24px", border: "1px solid #1e3a5f" }}>
                    <h2 style={{ margin: "0 0 6px", fontSize: 18, color: "#fff" }}>Processos por TRT</h2>
                    <ResponsiveContainer width="100%" height={280}>
                      <BarChart data={regioes}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#1e3a5f" />
                        <XAxis dataKey="trt" stroke="#8ecae6" angle={-20} textAnchor="end" height={60} />
                        <YAxis yAxisId="left" stroke="#2a9d8f" />
                        <YAxis yAxisId="right" orientation="right" stroke="#f4a261" />
                        <Tooltip />
                        <Bar yAxisId="left" dataKey="processos" fill="#2a9d8f" />
                        <Bar yAxisId="right" dataKey="valor" fill="#f4a261" />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                )}

                {tab === 3 && (
                  <div style={{ background: "#0d1b2a", borderRadius: 12, padding: "28px 24px", border: "1px solid #1e3a5f" }}>
                    <h2 style={{ margin: "0 0 6px", fontSize: 18, color: "#fff" }}>Maiores Litigantes</h2>
                    <div style={{ overflowX: "auto" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse" }}>
                        <thead>
                          <tr style={{ borderBottom: "2px solid #2a9d8f", color: "#8ecae6", textAlign: "left" }}>
                            <th style={{ padding: 10 }}>Empresa</th>
                            <th style={{ padding: 10 }}>Setor</th>
                            <th style={{ padding: 10 }}>Processos</th>
                          </tr>
                        </thead>
                        <tbody>
                          {empresas.map((e, i) => (
                            <tr key={i} style={{ borderBottom: "1px solid #1e3a5f" }}>
                              <td style={{ padding: 10 }}>{e.nome}</td>
                              <td style={{ padding: 10 }}>{e.setor}</td>
                              <td style={{ padding: 10 }}>{e.processos.toLocaleString()}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
